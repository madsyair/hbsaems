reference:
- title: "Model fitting (entry points)"
  desc: >
    Three layers of API for fitting a hierarchical Bayesian SAE model,
    from the most user-friendly distribution-specific wrappers to the
    universal brms interface, plus the post-fit refit helper.
  contents:
  - hbm
  - hbm_flex
  - hbm_lnln
  - hbm_betalogitnorm
  - hbm_binlogitnorm
  - update_hbm

- title: "Pre-fit data & spatial-weight checking"
  desc: >
    Validate data structure, missing-data patterns, and adjacency
    matrices before fitting.
  contents:
  - check_data
  - check_spatial_weight
  - build_spatial_weight

- title: "Configuration bundles"
  desc: >
    Helpers for assembling sampler / prior / nonlinear-term arguments
    into reusable named lists that can be passed to `hbm()` and its
    wrappers.
  contents:
  - hbm_control
  - hbm_priors
  - hbm_nonlinear

- title: "Bayesian workflow — diagnostics & comparison"
  desc: >
    Post-fit assessment of MCMC convergence, predictive performance,
    model selection, model averaging, and prior sensitivity. Together
    these cover stages 1, 3–7 of the canonical Bayesian workflow
    (Gelman et al. 2020).
  contents:
  - prior_check
  - convergence_check
  - is_converged
  - diagnostic_summary
  - model_compare
  - model_compare_all
  - model_average
  - prior_sensitivity
  - is.hbsaems_check
  - summary.hbsaems_check

- title: "Prediction & benchmarking"
  desc: >
    Out-of-sample prediction for unsampled areas (in-sample EBLUP and
    posterior predictive draws) and design-consistent benchmarking
    against direct estimates (Pfeffermann-style raking and ratio).
  contents:
  - sae_predict
  - sae_benchmark
  - sae_aggregate
  - sae_scale
  - sae_transform
  - sae_filter

- title: "Posterior & prior extraction"
  desc: >
    Light-touch helpers for extracting draws, summaries, and credible
    intervals from `hbmfit` / `brmsfit` objects, including the
    prior-only fit produced by `sample_prior = "only"`.
  contents:
  - posterior_draws
  - posterior_interval
  - posterior_summary_hbm
  - prior_draws

- title: "Custom brms families"
  desc: >
    Built-in custom distributions (loglogistic and shifted loglogistic)
    plus the framework for registering new families and Stan log-pdf
    functions through the model registry.
  contents:
  - brms_custom_loglogistic
  - brms_custom_shifted_loglogistic
  - loglogistic
  - shifted_loglogistic
  - build_brms_custom_family
  - read_stan_function
  - register_hbsae_brms_custom
  - register_hbsae_model
  - list_hbsae_models
  - get_hbsae_model

- title: "Object methods & internal state"
  desc: >
    S3 constructors, validators, and methods for the `hbmfit` class
    along with helpers to inspect a fitted model's metadata, raw data,
    and any warnings raised during fitting.
  contents:
  - hbmfit
  - new_hbmfit
  - validate_hbmfit
  - hbmfit-class
  - hbm_data
  - hbm_info
  - hbm_warnings
  - is-hbsaems
  - hbmfit-methods
  - posterior-methods
  - plot.hbmfit

- title: "Shiny dashboard"
  desc: >
    Launch the interactive bilingual (English / Indonesian) SAE GUI
    and inspect its translation infrastructure.
  contents:
  - run_sae_app
  - check_shiny_deps
  - tr
  - tr_langs
  - tr_keys

- title: "Datasets"
  desc: >
    Example datasets shipped for vignettes and tests, including spatial
    adjacency matrices used by the CAR / SAR / BYM2 examples.
  contents:
  - data_fhnorm
  - data_lnln
  - data_betalogitnorm
  - data_binlogitnorm
  - adjacency_matrix_car
  - adjacency_matrix_car_regency
  - spatial_weight_sar

- title: "Deprecated"
  desc: >
    Retained for backward compatibility; scheduled for removal in v2.0.0.
    Use the modern replacements listed in each function's documentation.
  contents:
  - hbcc
  - hbmc
  - hbpc
  - hbsae