url: https://madsyair.github.io/hbsaems/

template:
  bootstrap: 5
  bslib:
    primary: "#1976D2"
    base_font: {google: "Source Sans Pro"}
    heading_font: {google: "Source Sans Pro"}
    code_font: {google: "JetBrains Mono"}

development:
  mode: auto

home:
  title: hbsaems — Hierarchical Bayesian Area-Level SAE Models
  description: >
    Area-level Hierarchical Bayesian Small Area Estimation following
    Rao and Molina (2015), with computational implementation adapted
    to the 'brms' / Stan parameterisation. Supports Fay-Herriot
    normal, lognormal-lognormal, beta logit-normal, and binomial
    logit-normal models; CAR/SAR/BYM2 spatial random effects;
    survey-design-informed fixed parameters; missing data via
    multiple imputation or joint Bayesian imputation; and the
    complete Bayesian workflow (prior predictive checks, MCMC
    convergence diagnostics, posterior predictive checks, leave-one-
    out cross-validation, model comparison and averaging, prior
    sensitivity, design-consistent benchmarking).

